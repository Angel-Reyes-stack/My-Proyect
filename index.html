@keyframes floatUp {

  10% {

  90% {

  100% {

    opacity: 0;

  from {

  to {

/* Pantalla de Desbloqueo */
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #080f1a;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity 1.5s ease;
  overflow: hidden;
}

/* Fondo animado con estrellas y corazones */
.animated-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}

.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: #FF0000;
  transform: rotate(45deg);
  animation: fall 4s linear infinite;
}

.heart:before,
.heart:after {
  content: '';
  width: 20px;
  height: 20px;
  background: #FF0000;
  border-radius: 50%;
  position: absolute;
}

.heart:before {
  top: -10px;
  left: 0;
}

.heart:after {
  top: 0;
  left: -10px;
}

}

.bow-left,

@keyframes pulse {

@keyframes fall {

<script>
// Lógica para la pantalla de desbloqueo
const startScreen = document.getElementById('start-screen');
const bgMusic = document.getElementById('bg-music');

// Event listener para click y touch
startScreen.addEventListener('click', unlockGift);
startScreen.addEventListener('touchstart', unlockGift);

function unlockGift() {
  // Reproducir música
  bgMusic.play().catch(error => {
    console.log('Error al reproducir música:', error);
  });
  
  // Desvanecer pantalla de desbloqueo
  startScreen.style.opacity = '0';
  
  // Ocultar pantalla después de la transición
  setTimeout(() => {
    startScreen.style.display = 'none';
  }, 1500);
}
